<!DOCTYPE html>
<html>
<head>
    <title>Company Profile Card</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        article {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>

<body>

<header>
    <h1>My Company</h1>
    <p>We build simple and powerful solutions</p>
</header>

<main>
    <article>
        <h2>About Us</h2>
        <p>
            We are a startup company focused on delivering quality services
            and innovative solutions for modern problems.
        </p>
    </article>
</main>

<footer>
    <p>© 2026 My Company</p>

    <button style="background-color: blue; color: white; padding: 10px;">
        Contact Us
    </button>
</footer>

</body>
</html>
